name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: python -m compileall -q src scripts
      - name: Verify runtime imports and packaged prompts
        run: |
          python - <<'PY'
          import jinja2
          import tenacity
          from mnemos.agentic.prompts.manager import PromptManager
          from mnemos.main import app

          manager = PromptManager()
          templates = manager.list_templates()
          assert templates, "No prompt templates were packaged"
          assert app is not None
          print(f"runtime imports passed; {len(templates)} prompt templates found")
          PY
      - run: pytest -q

  migration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: mnemos
          POSTGRES_USER: mnemos
          POSTGRES_PASSWORD: mnemos
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U mnemos -d mnemos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+asyncpg://mnemos:mnemos@localhost:5432/mnemos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install .
      - run: alembic upgrade head
      - run: alembic downgrade base
      - run: alembic upgrade head

  image:
    runs-on: ubuntu-latest
    needs: [quality, migration]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mnemos-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
