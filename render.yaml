# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
#
# Zero-card hackathon deployment profile.
# Query execution runs inside the free API service via FastAPI background tasks.
# The dedicated worker code remains in the repository and can be enabled later
# by restoring a paid worker service and setting QUERY_DISPATCH_MODE=worker.
services:
  - type: web
    name: mnemos-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerCommand: migrate-and-api
    healthCheckPath: /health/live
    envVars:
      - key: APP_ENV
        value: production
      - key: QUERY_DISPATCH_MODE
        value: background
      - key: DATABASE_URL
        fromDatabase:
          name: mnemos-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: mnemos-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: AGENT_GATEWAY_MODE
        value: langgraph
      - key: MOCK_AGENT_ENABLED
        value: "false"
      - key: NEO4J_ENABLED
        value: "false"
      - key: NEO4J_STARTUP_REQUIRED
        value: "false"
      - key: NEO4J_REQUIRED_FOR_READINESS
        value: "false"
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: keyvalue
    name: mnemos-redis
    plan: free
    region: singapore
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

databases:
  - name: mnemos-postgres
    plan: free
    region: singapore
    databaseName: mnemos
    user: mnemos
    postgresMajorVersion: "16"
