<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b8e97"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ac3030"/>
    </marker>
    <marker id="c" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2b2e35"/>
    </marker>
  </defs>
  <rect width="760" height="320" fill="#ffffff" rx="12"/>
  <text x="24" y="22" fill="#14151a" font-size="13" font-weight="700">Governed Knowledge Lifecycle</text>

  <!-- 1. Draft -->
  <rect x="16" y="55" width="130" height="56" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="16" y="55" width="4" height="56" rx="2" fill="#ac3030"/>
  <text x="81" y="76" fill="#14151a" font-size="10" font-weight="600" text-anchor="middle">1. Draft</text>
  <text x="81" y="96" fill="#53565f" font-size="7.5" text-anchor="middle">Author creates card</text>

  <line x1="146" y1="83" x2="166" y2="83" stroke="#8b8e97" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 2. Pending Review -->
  <rect x="170" y="55" width="130" height="56" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="170" y="55" width="4" height="56" rx="2" fill="#2b2e35"/>
  <text x="235" y="76" fill="#14151a" font-size="10" font-weight="600" text-anchor="middle">2. Pending Review</text>
  <text x="235" y="96" fill="#53565f" font-size="7.5" text-anchor="middle">Submitted for review</text>

  <line x1="300" y1="83" x2="320" y2="83" stroke="#8b8e97" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 3. Under Review -->
  <rect x="324" y="55" width="130" height="56" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="324" y="55" width="4" height="56" rx="2" fill="#2b2e35"/>
  <text x="389" y="74" fill="#14151a" font-size="10" font-weight="600" text-anchor="middle">3. Under Review</text>
  <text x="389" y="92" fill="#53565f" font-size="7.5" text-anchor="middle">Role check</text>
  <text x="389" y="104" fill="#53565f" font-size="7.5" text-anchor="middle">Evidence verification</text>

  <line x1="454" y1="83" x2="474" y2="83" stroke="#8b8e97" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 4. Approved -->
  <rect x="478" y="55" width="130" height="56" rx="8" fill="#eef0f3" stroke="#cdd0d7" stroke-width="1.3"/>
  <rect x="478" y="55" width="4" height="56" rx="2" fill="#14151a"/>
  <text x="543" y="74" fill="#14151a" font-size="10" font-weight="600" text-anchor="middle">4. Approved</text>
  <text x="543" y="92" fill="#53565f" font-size="7.5" text-anchor="middle">Immutable snapshot</text>
  <text x="543" y="104" fill="#53565f" font-size="7.5" text-anchor="middle">Retains version history</text>

  <line x1="608" y1="83" x2="628" y2="83" stroke="#8b8e97" stroke-width="1.3" marker-end="url(#a)"/>

  <!-- 5. Superseded -->
  <rect x="632" y="55" width="114" height="56" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="632" y="55" width="4" height="56" rx="2" fill="#8b8e97"/>
  <text x="689" y="74" fill="#14151a" font-size="10" font-weight="600" text-anchor="middle">5. Superseded</text>
  <text x="689" y="96" fill="#53565f" font-size="7.5" text-anchor="middle">Audit trail preserved</text>

  <!-- Reject loop -->
  <path d="M454 111 Q454 140 389 140 Q324 140 324 111" stroke="#ac3030" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#b)"/>
  <text x="389" y="156" fill="#ac3030" font-size="7.5" font-style="italic" text-anchor="middle">Reject → return to draft</text>

  <!-- Supersession loop -->
  <path d="M543 111 Q543 180 689 180 Q750 180 750 140 Q750 111 746 111" stroke="#2b2e35" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#c)"/>
  <text x="718" y="176" fill="#2b2e35" font-size="7.5" font-style="italic" text-anchor="middle">New version supersedes old</text>

  <!-- Governance rules section -->
  <rect x="16" y="178" width="730" height="62" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1"/>
  <text x="28" y="196" fill="#14151a" font-size="9" font-weight="600">Governance Rules</text>
  <text x="28" y="212" fill="#53565f" font-size="7.5">&#x2022; Author cannot approve their own knowledge cards (separation of duty)</text>
  <text x="28" y="226" fill="#53565f" font-size="7.5">&#x2022; Only users with reviewer roles can approve or reject submissions</text>

  <!-- Additional lifecycle states -->
  <rect x="16" y="252" width="730" height="52" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1"/>
  <text x="28" y="270" fill="#14151a" font-size="9" font-weight="600">Related Lifecycles</text>

  <rect x="28" y="278" width="120" height="20" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="88" y="292" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">RCA Cases</text>

  <rect x="160" y="278" width="120" height="20" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="220" y="292" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Compliance Eval</text>

  <rect x="292" y="278" width="130" height="20" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="357" y="292" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Approval Requests</text>

  <text x="440" y="290" fill="#53565f" font-size="7">draft → under_review → approved/rejected → closed</text>
</svg>
