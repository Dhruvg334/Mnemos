  <text x="387" y="188" fill="#53565f" font-size="7.5" text-anchor="middle">Rate limits · Audit</text>
  <text x="387" y="202" fill="#53565f" font-size="7.5" text-anchor="middle">Query orchestration</text>

  <rect x="510" y="140" width="218" height="78" rx="6" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
