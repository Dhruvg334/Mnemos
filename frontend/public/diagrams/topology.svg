  <text x="503" y="262" fill="#53565f" font-size="7.5" text-anchor="middle">Neo4j disabled for free tier · S3-compatible storage (MinIO)</text>
  <line x1="387" y1="218" x2="387" y2="232" stroke="#cdd0d7" stroke-width="0.8"/>
  <line x1="619" y1="218" x2="619" y2="232" stroke="#cdd0d7" stroke-width="0.8"/>

