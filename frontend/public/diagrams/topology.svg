  <text x="619" y="202" fill="#53565f" font-size="7.5" text-anchor="middle">Approval queue</text>

  <rect x="278" y="232" width="450" height="40" rx="6" fill="#eef0f3" stroke="#cdd0d7" stroke-width="1"/>
