  <text x="190" y="288" fill="#14151a" font-size="11" font-weight="700" text-anchor="middle">Docker Compose (Self-hosted)</text>
  <line x1="50" y1="298" x2="330" y2="298" stroke="#e2e4e9" stroke-width="0.8"/>

  <rect x="28" y="306" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="102" y="322" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">pgvector:16 (PostgreSQL)</text>

  <rect x="188" y="306" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="262" y="322" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Neo4j 5 (Graph DB)</text>

  <rect x="28" y="338" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="102" y="354" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">MinIO (S3-compatible)</text>

  <rect x="188" y="338" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="262" y="354" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Redis 7 (Cache)</text>

  <rect x="28" y="370" width="308" height="24" rx="4" fill="#eef0f3" stroke="#cdd0d7" stroke-width="0.8"/>
  <text x="182" y="386" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Docker Compose Production: api + migrate + worker</text>

  <!-- HF Spaces -->
  <rect x="396" y="266" width="348" height="136" rx="10" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="396" y="266" width="5" height="136" rx="2.5" fill="#2f6fe0"/>
  <text x="570" y="288" fill="#14151a" font-size="11" font-weight="700" text-anchor="middle">Hugging Face Spaces (Optional)</text>
  <line x1="430" y1="298" x2="710" y2="298" stroke="#e2e4e9" stroke-width="0.8"/>

  <rect x="408" y="306" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="482" y="322" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">Cross-Encoder Reranker</text>

  <rect x="568" y="306" width="148" height="24" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="0.8"/>
  <text x="642" y="322" fill="#14151a" font-size="7.5" font-weight="600" text-anchor="middle">MiniLM-L-6-v2</text>

  <text x="570" y="360" fill="#53565f" font-size="7.5" text-anchor="middle">Docker port 7860 · GPU/CPU auto-scale</text>
  <text x="570" y="376" fill="#53565f" font-size="7.5" text-anchor="middle">Standalone service, not bundled with API</text>

  <!-- Arrow from Render to HF -->
  <path d="M750 169 L760 169" stroke="#8b8e97" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="754" y="162" fill="#8b8e97" font-size="6.5" font-style="italic">S3</text>
