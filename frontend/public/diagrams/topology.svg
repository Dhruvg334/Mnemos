  <line x1="120" y1="70" x2="120" y2="100" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="380" y1="70" x2="380" y2="100" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>
  <line x1="640" y1="70" x2="640" y2="100" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

