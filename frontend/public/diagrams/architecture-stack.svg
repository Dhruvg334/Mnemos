<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b8e97"/>
    </marker>
  </defs>
  <rect width="720" height="520" fill="#ffffff" rx="12"/>

  <!-- Layer 1: Frontend -->
  <rect x="100" y="20" width="520" height="68" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="100" y="20" width="5" height="68" rx="2.5" fill="#2b2e35"/>
  <text x="125" y="42" fill="#2b2e35" font-size="9" font-weight="700" letter-spacing="1.5">FRONTEND LAYER</text>
  <text x="125" y="58" fill="#14151a" font-size="13" font-weight="600">Next.js 14 · React 18 · Tailwind CSS</text>
  <text x="125" y="74" fill="#53565f" font-size="9">Server Components · Streaming SSR · Vercel deployment</text>
  <path d="M620 54 L640 54 L640 80" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <text x="644" y="58" fill="#8b8e97" font-size="7.5" font-style="italic">HTTP</text>
  <text x="644" y="69" fill="#8b8e97" font-size="7.5" font-style="italic">JSON</text>

  <!-- Layer 2: API -->
  <rect x="100" y="98" width="520" height="68" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="100" y="98" width="5" height="68" rx="2.5" fill="#2b2e35"/>
  <text x="125" y="120" fill="#2b2e35" font-size="9" font-weight="700" letter-spacing="1.5">API LAYER</text>
  <text x="125" y="136" fill="#14151a" font-size="13" font-weight="600">FastAPI · Pydantic v2 · SQLAlchemy 2.0</text>
  <text x="125" y="152" fill="#53565f" font-size="9">Async REST endpoints · OpenAPI · Alembic migrations · JWT auth</text>
  <path d="M620 132 L640 132 L640 158" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <text x="644" y="136" fill="#8b8e97" font-size="7.5" font-style="italic">HTTP</text>
  <text x="644" y="147" fill="#8b8e97" font-size="7.5" font-style="italic">JSON</text>

  <!-- Layer 3: Service -->
  <rect x="100" y="176" width="520" height="68" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="100" y="176" width="5" height="68" rx="2.5" fill="#2b2e35"/>
  <text x="125" y="198" fill="#2b2e35" font-size="9" font-weight="700" letter-spacing="1.5">SERVICE LAYER</text>
  <text x="125" y="214" fill="#14151a" font-size="13" font-weight="600">Query Execution · Ingestion · Audit</text>
  <text x="125" y="230" fill="#53565f" font-size="9">Idempotency · Agent validation · Email delivery · Background dispatch</text>
  <path d="M620 210 L640 210 L640 236" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <text x="644" y="214" fill="#8b8e97" font-size="7.5" font-style="italic">HTTP</text>
  <text x="644" y="225" fill="#8b8e97" font-size="7.5" font-style="italic">JSON</text>

  <!-- Layer 4: Agentic -->
  <rect x="100" y="254" width="520" height="68" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="100" y="254" width="5" height="68" rx="2.5" fill="#2b2e35"/>
  <text x="125" y="276" fill="#2b2e35" font-size="9" font-weight="700" letter-spacing="1.5">AGENTIC LAYER</text>
  <text x="125" y="292" fill="#14151a" font-size="13" font-weight="600">InvestigationPipeline · MCP Server · Guardrails</text>
  <text x="125" y="308" fill="#53565f" font-size="9">11-stage runtime · 6 specialised agents · Human approval gate</text>
  <path d="M620 288 L640 288 L640 314" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <text x="644" y="292" fill="#8b8e97" font-size="7.5" font-style="italic">HTTP</text>
  <text x="644" y="303" fill="#8b8e97" font-size="7.5" font-style="italic">JSON</text>

  <!-- Layer 5: Retrieval & Integrations -->
  <rect x="100" y="332" width="520" height="68" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.5"/>
  <rect x="100" y="332" width="5" height="68" rx="2.5" fill="#2b2e35"/>
  <text x="125" y="354" fill="#2b2e35" font-size="9" font-weight="700" letter-spacing="1.5">RETRIEVAL &amp; INTEGRATIONS</text>
  <text x="125" y="370" fill="#14151a" font-size="13" font-weight="600">HybridRetrievalEngine · Cross-Encoder · S3 · Gateways</text>
  <text x="125" y="386" fill="#53565f" font-size="9">pgvector · Full-text · Graph RAG · Structured · Multi-hop · Reranker</text>
  <path d="M620 366 L640 366 L640 392" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <text x="644" y="370" fill="#8b8e97" font-size="7.5" font-style="italic">HTTP</text>
  <text x="644" y="381" fill="#8b8e97" font-size="7.5" font-style="italic">JSON</text>

  <!-- Layer 6: Data -->
  <rect x="100" y="410" width="520" height="90" rx="8" fill="#eef0f3" stroke="#cdd0d7" stroke-width="1.5"/>
  <rect x="100" y="410" width="5" height="90" rx="2.5" fill="#14151a"/>
  <text x="125" y="432" fill="#14151a" font-size="9" font-weight="700" letter-spacing="1.5">DATA LAYER</text>
  <text x="125" y="448" fill="#14151a" font-size="13" font-weight="600">PostgreSQL + pgvector · Neo4j · Redis · MinIO (S3)</text>
  <text x="125" y="464" fill="#53565f" font-size="9">Business records · HNSW vector index · Graph entities</text>
  <text x="125" y="478" fill="#53565f" font-size="9">Rate limiting · Object store · Durable checkpoints</text>

  <!-- Side labels -->
  <text x="40" y="280" fill="#8b8e97" font-size="9" font-style="italic" transform="rotate(-90,40,280)" text-anchor="middle">REST / JSON over HTTPS</text>
  <line x1="72" y1="40" x2="72" y2="475" stroke="#cdd0d7" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M72 450 L100 450" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
  <path d="M72 55 L100 55" stroke="#8b8e97" stroke-width="1.2" fill="none" marker-end="url(#a)"/>
</svg>
