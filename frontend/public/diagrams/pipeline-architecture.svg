<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b8e97"/>
    </marker>
    <marker id="b" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ac3030"/>
    </marker>
    <marker id="c" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2f6fe0"/>
    </marker>
  </defs>
  <rect width="760" height="400" fill="#ffffff" rx="12"/>
  <text x="24" y="22" fill="#14151a" font-size="13" font-weight="700">11-Stage LangGraph Investigation Pipeline</text>

  <!-- Row 1: Stages 1-7 -->
  <rect x="16" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="16" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="65" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">1. Supervisor</text>
  <text x="65" y="73" fill="#53565f" font-size="7" text-anchor="middle">Initialise state</text>

  <line x1="114" y1="63" x2="128" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="132" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="132" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="181" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">2. Query Router</text>
  <text x="181" y="73" fill="#53565f" font-size="7" text-anchor="middle">Classify intent</text>

  <line x1="230" y1="63" x2="244" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="248" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="248" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="297" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">3. Retrieval</text>
  <text x="297" y="73" fill="#53565f" font-size="7" text-anchor="middle">Plan strategies</text>

  <line x1="346" y1="63" x2="360" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="364" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="364" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="413" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">4. Evidence</text>
  <text x="413" y="73" fill="#53565f" font-size="7" text-anchor="middle">5-strategy fetch</text>

  <line x1="462" y1="63" x2="476" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="480" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="480" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="529" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">5. Verification</text>
  <text x="529" y="73" fill="#53565f" font-size="7" text-anchor="middle">Provenance check</text>

  <line x1="578" y1="63" x2="592" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="596" y="42" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="596" y="42" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="645" y="58" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">6. Reflection</text>
  <text x="645" y="73" fill="#53565f" font-size="7" text-anchor="middle">Max 3 cycles</text>

  <line x1="694" y1="63" x2="708" y2="63" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="712" y="42" width="34" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <text x="729" y="63" fill="#14151a" font-size="7" font-weight="600" text-anchor="middle">7.</text>
  <text x="729" y="77" fill="#53565f" font-size="6" text-anchor="middle">Agents</text>

  <!-- Reflection loop -->
  <path d="M694 84 Q738 84 738 108 Q738 132 694 132" stroke="#2f6fe0" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#c)"/>
  <text x="736" y="110" fill="#2f6fe0" font-size="6.5" font-style="italic">Refine</text>

  <!-- Specialized Agents container -->
  <rect x="16" y="106" width="704" height="68" rx="8" fill="#eef0f3" stroke="#cdd0d7" stroke-width="1"/>
  <text x="28" y="122" fill="#14151a" font-size="9" font-weight="600">7. Specialised Agents — Intent-based dispatch</text>

  <rect x="24" y="132" width="108" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="78" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">RCA Agent</text>
  <text x="78" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Root cause</text>

  <rect x="140" y="132" width="108" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="194" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">Compliance Agent</text>
  <text x="194" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Regulation</text>

  <rect x="256" y="132" width="108" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="310" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">Asset Intel Agent</text>
  <text x="310" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Equipment</text>

  <rect x="372" y="132" width="108" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="426" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">Expert Knowledge</text>
  <text x="426" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Domain KB</text>

  <rect x="488" y="132" width="108" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="542" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">Lessons Learned</text>
  <text x="542" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Historical</text>

  <rect x="604" y="132" width="100" height="34" rx="4" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <text x="654" y="146" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">General Agent</text>
  <text x="654" y="158" fill="#53565f" font-size="6.5" text-anchor="middle">Fallback</text>

  <line x1="368" y1="174" x2="368" y2="192" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="340" y="186" fill="#8b8e97" font-size="7" font-style="italic">Dispatch</text>

  <!-- Row 2: Stages 8-11 -->
  <rect x="124" y="196" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="124" y="196" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="173" y="212" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">8. Report</text>
  <text x="173" y="226" fill="#53565f" font-size="7" text-anchor="middle">Synthesise findings</text>

  <line x1="222" y1="217" x2="240" y2="217" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="244" y="196" width="108" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="244" y="196" width="3" height="42" rx="1.5" fill="#ac3030"/>
  <text x="298" y="212" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">9. Human Approval</text>
  <text x="298" y="226" fill="#53565f" font-size="7" text-anchor="middle">&#x23F8; Durable pause gate</text>

  <line x1="352" y1="217" x2="370" y2="217" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="374" y="196" width="98" height="42" rx="6" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1.3"/>
  <rect x="374" y="196" width="3" height="42" rx="1.5" fill="#2f6fe0"/>
  <text x="423" y="212" fill="#14151a" font-size="8" font-weight="600" text-anchor="middle">10. Final Response</text>
  <text x="423" y="226" fill="#53565f" font-size="7" text-anchor="middle">Format answer</text>

  <line x1="472" y1="217" x2="490" y2="217" stroke="#8b8e97" stroke-width="1.2" marker-end="url(#a)"/>

  <rect x="494" y="196" width="98" height="42" rx="20" fill="#eef0f3" stroke="#cdd0d7" stroke-width="1.3"/>
  <rect x="494" y="196" width="3" height="42" rx="1.5" fill="#14151a"/>
  <text x="543" y="212" fill="#14151a" font-size="9" font-weight="700" text-anchor="middle">11. Complete</text>
  <text x="543" y="226" fill="#53565f" font-size="7.5" text-anchor="middle">Save checkpoint</text>

  <!-- Reject loop -->
  <path d="M352 238 Q352 272 298 272 Q180 272 173 238" stroke="#ac3030" stroke-width="1" stroke-dasharray="4 3" fill="none" marker-end="url(#b)"/>
  <text x="264" y="282" fill="#ac3030" font-size="7" font-style="italic">Reject / revise</text>

  <!-- Legend -->
  <rect x="16" y="290" width="10" height="10" rx="2" fill="#2f6fe0"/>
  <text x="32" y="298" fill="#53565f" font-size="7.5">Pipeline stage</text>
  <rect x="110" y="290" width="10" height="10" rx="2" fill="#ac3030"/>
  <text x="126" y="298" fill="#53565f" font-size="7.5">Approval gate</text>
  <rect x="200" y="290" width="10" height="10" rx="2" fill="#14151a"/>
  <text x="216" y="298" fill="#53565f" font-size="7.5">Terminal stage</text>

  <rect x="16" y="320" width="728" height="62" rx="8" fill="#f6f7f9" stroke="#e2e4e9" stroke-width="1"/>
  <text x="24" y="338" fill="#14151a" font-size="9" font-weight="600">Runtime Infrastructure</text>
  <text x="24" y="354" fill="#53565f" font-size="7.5">DurableCheckpointManager · DurableEventLog · DurableAuditLogger · IdempotentNodeExecutor</text>
  <text x="24" y="368" fill="#53565f" font-size="7.5">FailureRecoveryManager · TracingManager · ModelRouter · Memory · GuardrailPolicyEngine</text>
  <line x1="368" y1="238" x2="368" y2="320" stroke="#cdd0d7" stroke-width="0.8" stroke-dasharray="3 3"/>
</svg>
